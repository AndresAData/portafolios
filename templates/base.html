<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AndresReyes{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        html, body {
            height: 100%;
        }

        body {
            background-color: #0b1120;
            color: #e5e7eb;
            display: flex;
            flex-direction: column;
        }

        .bg-surface {
            background-color: #111827;
        }

        .text-primary-custom {
            color: #2dd4bf;
        }

        .text-secondary-custom {
            color: #8b5cf6;
        }

        .text-muted-custom {
            color: #9ca3af;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #2dd4bf, #8b5cf6);
            border: none;
            color: #0b1120;
            font-weight: 600;
        }

        .btn-gradient:hover {
            opacity: 0.9;
        }

        .border-soft {
            border: 1px solid rgba(255,255,255,0.08);
        }

        .main-content {
            flex: 1;
        }
            /* Animaciones */
        .fade-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease forwards;
        }

        .fade-up.delay-1 { animation-delay: 0.2s; }
        .fade-up.delay-2 { animation-delay: 0.4s; }
        .fade-up.delay-3 { animation-delay: 0.6s; }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hover cards */
        .card-hover {
            transition: all 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Icon style */
        .icon-lg {
            font-size: 2rem;
        }

        /* 🔥 NAVBAR FIX COMPLETO */

        /* Brand (AndresReyes) */
        .navbar-brand {
            color: #2dd4bf !important;
            transition: 0.3s;
        }

        .navbar-brand:hover {
            color: #5eead4 !important; /* teal más claro */
        }

        /* Links */
        .navbar .nav-link {
            color: #9ca3af !important;
            transition: 0.3s;
        }

        .navbar .nav-link:hover {
            color: #ffffff !important;
        }

        /* Evita que Bootstrap los vuelva oscuros */
        .navbar .nav-link:focus,
        .navbar .nav-link:active {
            color: #ffffff !important;
        }

        /* Usuario logueado */
        .navbar .user-text {
            color: #e5e7eb;
        }

        /* Botón toggler (mobile) */
        .navbar-toggler {
            border: none;
        }

        .navbar-toggler:focus {
            box-shadow: none;
        }

        /* Icono hamburguesa visible en dark */
        .navbar-toggler-icon {
            filter: invert(1);
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

    {% include "includes/navbar.html" %}

    <!-- 🔥 Contenedor flexible -->
    <main class="container py-5 main-content">
        {% block content %}
        <!-- contenido -->
        {% endblock %}
    </main>

    {% include "includes/footer.html" %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
